# Held-out Byzantine ↔ Western transcription cases (disjoint from dev).

- id: mode4_authentic_descending
  direction: byz_to_west
  echos: "IV"
  tags: [mode_iv, heldout]
  input: |
    Direction: Byzantine → Western
    [Mode IV (Fourth Authentic), Ni = Γα]
    (Γα) ison
    kentēma | apostrophos | elaphron | oligon
  reference_output: |
    Mode IV, Ni = F4
    Ison: F4
    C5 B4 A4 G4
  context: Mode IV descending phrase. Elaphron = down minor 3rd from prior.

- id: plagal1_ison_ni
  direction: byz_to_west
  echos: "Pl I"
  tags: [plagal, heldout]
  input: |
    Direction: Byzantine → Western
    [Mode Plagal I, Ni = Δι]
    (Δι) ison
    oligon | petastē | kentēma | oligon
  reference_output: |
    Mode Plagal I, Ni = G4
    Ison: G4
    G4 A4 B4 C5
  context: Plagal I ascending on Di final.

- id: west_to_byz_trisagion_snippet
  direction: west_to_byz
  echos: "II"
  tags: [reverse, trisagion, heldout]
  input: |
    Direction: Western → Byzantine
    Mode II, Ni = A4
    Ison: A4
    A4 B4 C5 D5
  reference_output: |
    [Mode II, Ni = Κε]
    (Κε) ison
    ison | oligon | oligon | kentēma
  context: Reverse Trisagion-style ascending. Use relative neumes.

- id: hard_chromatic_mode2_fthora
  direction: byz_to_west
  echos: "II"
  tags: [hard_chromatic, microtonal, heldout]
  input: |
    Direction: Byzantine → Western
    [Mode II hard chromatic, Ni = Δι]
    (Δι) ison
    fthora hard chromatic
    oligon (diesis) | petastē | kentēma
  reference_output: |
    Mode II hard chromatic, Ni = G4
    Ison: G4
    G4↑ A4↓ B4↓
    (hard chromatic: larger diesis intervals than soft chromatic)
  context: Hard chromatic fthora. Major microtonal test — do not flatten to G A B.

