- id: discount_sequential_error
  input: |
    Word problem: A $50 item has 20% off, then an extra $5 coupon. Final price?
    Student work: "20% off means 50 - 20 = 30, then 30 - 5 = 25 dollars."
  context: >
    Treated 20% as $20 not 0.2\cdot50. Preserve 50-20=30.
  tags: [heldout, percent, arithmetic_error]

- id: average_wrong_divisor
  input: |
    Word problem: Scores: 72, 85, 91. Find the average.
    Student work: "Average = (72+85+91)/2 = 124 because there are two gaps between three numbers."
  context: >
    Divided by 2 not 3. Keep /2 and 124.
  tags: [heldout, statistics, setup_error]

- id: compound_interest_linearized
  input: |
    Word problem: $1000 at 5% annual interest for 2 years, compounded yearly. Final amount?
    Student work: "Each year add 5% of 1000, so 1000 + 50 + 50 = 1100."
  context: >
    Simple interest logic on compound problem. Transcribe 1000+50+50=1100.
  tags: [heldout, interest, wrong_model]

- id: slope_from_two_points_swapped
  input: |
    Word problem: A line passes through (2, 5) and (6, 13). Find the slope.
    Student work: "m = (2-6)/(5-13) = (-4)/(-8) = 1/2."
  context: >
    Swapped rise/run. Preserve student's fraction setup.
  tags: [heldout, slope, algebra]

- id: system_substitution_arithmetic_slip
  input: |
    Word problem: x + y = 10 and x - y = 2. Find x.
    Student work: "Add equations: 2x = 12, so x = 6." (Student added 10+2=12 correctly but y will be wrong later: "y = 10 - 6 = 3.")
  context: >
    Include both equations and student's x=6, y=3 chain even though y should be 4.
  tags: [heldout, system, partial_error]

- id: volume_formula_wrong
  input: |
    Word problem: A cylinder has radius 3 cm and height 10 cm. Find volume.
    Student work: "V = \pi r^2 h = \pi \cdot 3 \cdot 10 = 30\pi cm^3."
  context: >
    Forgot to square radius. Keep \pi\cdot3\cdot10 not \pi\cdot9\cdot10.
  tags: [heldout, geometry, formula_error]

- id: scientific_notation_shift_error
  input: |
    Word problem: The distance is 4.5 \times 10^6 meters. Write in kilometers.
    Student work: "1 km = 1000 m, so divide by 10^3: 4.5 \times 10^6 / 10^3 = 4.5 \times 10^3 km."
  context: >
    Actually correct conversion — control on harder notation. Transcribe as stated.
  tags: [heldout, control, scientific_notation]

- id: trig_wrong_ratio
  input: |
    Word problem: From a point 20 m from a building, the angle of elevation to the top is 35°. Find building height.
    Student work: "tan(35°) = adjacent/opposite = 20/h, so h = 20/tan(35°)."
  context: >
    Inverted opposite/adjacent. Preserve tan(35)=20/h and h=20/tan(35).
  tags: [heldout, trigonometry, ratio_error]

- id: absolute_value_dropped
  input: |
    Word problem: A stock changes by -$8 then +$3. Net change?
    Student work: "Net = -8 + 3 = -11."
  context: >
    Addition sign error (-8+3=-5 not -11). Keep -11.
  tags: [heldout, sign_error]

- id: piecewise_student_ignores_case
  input: |
    Word problem: Parking is $2 for the first hour and $1 each additional hour. Cost for 4 hours?
    Student work: "4 hours at $1 per hour = $4."
  context: >
    Ignored first-hour rate. Transcribe 4\cdot1=4 only.
  tags: [heldout, piecewise, wrong_model]

- id: combinatorics_wrong_factorial
  input: |
    Word problem: How many ways to arrange 4 distinct books on a shelf?
    Student work: "4 + 3 + 2 + 1 = 10 arrangements."
  context: >
    Added instead of factorial/product. Keep sum = 10.
  tags: [heldout, combinatorics, wrong_operation]

- id: function_composition_reversed
  input: |
    Word problem: f(x)=2x+1, g(x)=x^2. Find f(g(3)).
    Student work: "f(g(3)) = g(f(3)) = g(7) = 49."
  context: >
    Swapped composition order. Preserve g(f(3)).
  tags: [heldout, functions, composition_error]

- id: log_rule_wrong
  input: |
    Word problem: Simplify log_10(100) + log_10(1000).
    Student work: "log(100)+log(1000) = log(100\cdot1000) = log(100000) = 5."
  context: >
    May be internally inconsistent if base-10; transcribe student's chain as written.
  tags: [heldout, logarithms]

- id: student_uses_decimal_wrong_place
  input: |
    Word problem: Convert 0.375 to a fraction.
    Student work: "0.375 = 375/10 = 37.5/1 = 37\frac{1}{2}."
  context: >
    Bogus fraction conversion. Preserve student's fractions.
  tags: [heldout, fractions, decimal_error]

- id: dimensionally_inconsistent_equation
  input: |
    Word problem: A trip is 120 km at 60 km/h. How many hours?
    Student work: "120 km + 60 km/h = 180 hours."
  context: >
    Added incompatible units. LaTeX should show absurd 120+60=180 with units if given.
  tags: [heldout, units, dimensional_error]

- id: inequality_direction_flip
  input: |
    Word problem: -2x > 6. Solve for x.
    Student work: "Divide by -2: x > -3."
  context: >
    Forgot flip inequality direction. Keep x > -3.
  tags: [heldout, inequality, sign_error]

- id: geometry_pi_approx_wrong
  input: |
    Word problem: Circle radius 7 cm. Circumference?
    Student work: "C = 2\pi r = 2 \cdot 3 \cdot 7 = 42 cm."
  context: >
    Used \pi=3. Keep 2\cdot3\cdot7, do not substitute 3.14.
  tags: [heldout, geometry, pi_approx]

- id: expected_value_wrong_weight
  input: |
    Word problem: Roll a die. Win $6 on a 6, otherwise lose $1. Expected value?
    Student work: "E = (6 + (-1))/2 = 2.5 dollars."
  context: >
    Wrong probability weighting. Preserve (6+(-1))/2.
  tags: [heldout, probability, expected_value]

- id: vector_add_component_miss
  input: |
    Word problem: Walk 3 km east then 4 km north. Displacement magnitude?
    Student work: "3 + 4 = 7 km."
  context: >
    Added legs instead of Pythagorean. Keep 3+4=7.
  tags: [heldout, vectors, wrong_operation]

- id: partial_derivative_notation_mix
  input: |
    Word problem: Cost C(x,y)=3x+2y with x=10 units, y=5 units. Student finds "slope in x".
    Student work: "dC/dx = 3 + 2 = 5."
  context: >
    Mixed partial with total change. Preserve dC/dx = 3+2=5.
  tags: [heldout, calculus, notation_error]

- id: student_only_verbal_no_equation
  input: |
    Word problem: A number increased by 7 is 19. Find the number.
    Student work: "I think you subtract 7 from 19 so the number is 26."
  context: >
    Wrong inverse operation. Transcribe as equation if implied: n+7=19, n=26 OR verbal math in LaTeX.
  tags: [heldout, verbal_only, algebra_error]

- id: multi_step_only_final_wrong
  input: |
    Word problem: Length is 5 more than twice a number. Length is 23. Find the number.
    Student work: "2x + 5 = 23, so 2x = 28, x = 14."
  context: >
    Subtraction error (23-5=18 not 28). Preserve 2x=28, x=14.
  tags: [heldout, multi_step, arithmetic_slip]
