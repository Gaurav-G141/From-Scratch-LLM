# Gold references for Opus judge only.

- id: break_ni_trap_pa_not_a
  direction: byz_to_west
  echos: "Pl IV"
  tags: [ni_trap, plagal, compound, break]
  source_url: https://cappellaromana.org/wp-content/uploads/2014/04/Prokeimenon-Byz_Divine-Liturgy-Music_Cappella-Romana.pdf
  input: |
    Direction: Byzantine → Western
    [Mode Plagal IV, martyria Ni = Πα]
    NOTE: Πα = D4. Do NOT use A3 or G4 as Ni.
    (Πα) ison
    petastē | oligon | apostrophos | kentēma | oligon
  reference_output: |
    Mode Plagal IV, Ni = D4
    Ison: D4
    E4 D4 C4 D4 E4
  context: >
    GPT-4o used A3 for Πα. Ni=Pa=D4 mandatory. Prokeimenon-style (Cappella Romana corpus).

