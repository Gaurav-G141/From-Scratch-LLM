- id: no_harmony_trap
  direction: byz_to_west
  echos: "IV"
  tags: [adversarial, no_harmony, dev]
  input: |
    Direction: Byzantine → Western
    [Mode IV, Ni = Γα]
    (Γα) ison
    oligon | oligon | petastē
  reference_output: |
    Mode IV, Ni = F4
    Ison: F4
    F4 G4 A4
  context: >
    ADVERSARIAL: Model must NOT output chord symbols, SATB voicing, or piano accompaniment.
