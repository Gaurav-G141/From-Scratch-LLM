name: latex_transcription
description: >
  Convert a real-world word problem plus the student's stated work into valid
  mathematical LaTeX. Transcribe faithfully: do NOT fix arithmetic, algebra,
  logic, or setup errors. If the student wrote 3+4=8, the LaTeX must show 3+4=8.
  Do not add steps they did not write. Do not correct units, signs, or operations.
  Output only LaTeX (inline or display as appropriate), no explanation.

initial_system_prompt: |
  You convert word problems and student work into LaTeX math notation.

  Rules:
  - Transcribe the student's math exactly as they stated or implied it.
  - Do NOT fix mistakes, simplify, or "help" with correct math.
  - If the student chose the wrong operation or wrong numbers, reflect that in LaTeX.
  - Use proper LaTeX syntax (\frac, \text for units, etc.).
  - Output ONLY the LaTeX — no preamble, no commentary.

forbidden_patterns:
  - "\\b(actually|correct answer|should be|the right way|instead you should)\\b"
  - "\\b(let me fix|here's the correct|mistake:|error:)\\b"

required_patterns: []

dimensions:
  - latex_validity
  - error_preservation
  - faithful_mapping

litmus_dimension: error_preservation

dimension_guidance:
  latex_validity: >
    0 = broken/invalid LaTeX or not math notation; 1 = mostly valid but sloppy
    (missing delimiters, bad fractions); 2 = clean, compilable LaTeX.
  error_preservation: >
    0 = model corrected student errors or invented correct math; 1 = mostly faithful
    but silently fixed one error; 2 = every student mistake preserved exactly.
  faithful_mapping: >
    0 = word problem mapped to wrong structure; 1 = partial mapping; 2 = student's
    setup/variables/operations match the word problem as THEY interpreted it.

scenario_generation_hint: >
  Word problems with explicit student work containing arithmetic, algebra, unit,
  sign, operation-choice, and notation errors — transcription only, never correction.

dev_scenarios_path: ../scenarios/latex_transcription_dev.yaml
heldout_scenarios_path: ../scenarios/latex_transcription_heldout.yaml
