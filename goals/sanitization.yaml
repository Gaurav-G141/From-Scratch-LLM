name: sanitization
description: >
  Rewrite the given text so it is genuinely school-appropriate: remove rudeness,
  insults, sarcasm, passive-aggression, backhanded comments, condescension, and
  mild profanity — but keep the speaker's underlying meaning, emotion, and intent.
  The result must sound sincerely respectful, not "politely cruel." Do not swap open
  rudeness for passive-aggression. Do not add a lecture or moral commentary.
  Return only the rewritten text, nothing else.

initial_system_prompt: |
  You rewrite text to be genuinely school-appropriate while preserving the original
  meaning and emotional intent.

  Remove: insults, sarcasm, mild profanity, passive-aggression, backhanded comments,
  condescension, veiled digs, and dismissive "polite" phrasing.

  Do NOT replace open rudeness with passive-aggression (e.g. "with all due respect…",
  "if you say so", "must be nice", sarcastic "thanks", "clearly you…"). Rewrite to
  sound like a supportive, direct peer or teacher — honest but kind.

  Keep the core message. Output only the rewritten text — no preamble or explanation.

forbidden_patterns:
  - "\\b(damn|hell|crap|stupid|idiot|moron|jerk|loser|dumb|sucks|shut up|hate you)\\b"
  - "\\bwhat is wrong with you\\b"
  - "\\bonly you would\\b"
  - "\\bwith all due respect\\b"
  - "\\bno offense\\b"
  - "\\bif you say so\\b"
  - "\\bmust be nice\\b"
  - "\\bfor once\\b"
  - "\\bclearly you\\b"
  - "\\bobviously you\\b"

required_patterns: []

dimensions:
  - cleanliness
  - meaning_preservation

litmus_dimension: cleanliness

dimension_guidance:
  cleanliness: >
    HARSH GATE — score 2 is RARE. 0 = any rudeness, profanity, insults, sarcasm,
    passive-aggression, backhanded phrasing, condescension, veiled digs, dismissive
    tone, or blame. 1 = technically civil but still cold, stiff, frustrated-with-you,
    talking down, or carrying negative subtext — most critical rewrites land here.
    2 = ONLY unmistakably warm, constructive, and sincere — like a caring teacher
    giving honest feedback without any sting. If you would hesitate to say it aloud
    in front of a principal, it is NOT a 2.
  meaning_preservation: >
    0 = core message, complaint, or emotional intent is lost, watered down to nothing,
    or reversed; 1 = partially preserved but important nuance or frustration is missing;
    2 = original intent and key information fully preserved in cleaner language.

pass_thresholds:
  cleanliness: 2.0
  meaning_preservation: 1.5

scenario_generation_hint: >
  Subtly rude school-context messages: passive-aggressive comments, sarcasm,
  mild profanity, veiled insults, frustrated venting — not slurs or blatant hate.

dev_scenarios_path: ../scenarios/sanitization_dev.yaml
heldout_scenarios_path: ../scenarios/sanitization_heldout.yaml
