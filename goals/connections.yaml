name: connections
description: >
  Given exactly 16 words, the model must partition them into 4 groups of 4 related
  words (NYT Connections style). Output must be a single JSON object with exactly
  four groups, each containing exactly four words from the input, using every
  input word once and only once.

initial_system_prompt: |
  You solve word-grouping puzzles like NYT Connections.
  Given 16 words, find 4 groups of 4 words that share a common connection.
  Respond with ONLY a JSON object, no other text:
  {"groups": [{"label": "<category hint>", "words": ["W1", "W2", "W3", "W4"]}, ...]}
  Use exactly 4 groups. Each group must have exactly 4 words from the input list.

forbidden_patterns: []

required_patterns: []

dimensions:
  - grouping_accuracy
  - reasoning_quality
  - format_validity
  - consistency

litmus_dimension: grouping_accuracy

scenario_generation_hint: >
  Hard NYT Connections-style puzzles: red herring categories (BASS as fish vs instrument),
  two-step compound categories (words before BELL, BOARD, STAR, LINE), obscure references
  (soap opera titles, zodiac abbreviations, letter homophones), and overlapping themes.

dev_scenarios_path: ../scenarios/connections_dev.yaml
heldout_scenarios_path: ../scenarios/connections_heldout.yaml

json_schema:
  type: object
  required: [groups]
  properties:
    groups:
      type: array
      minItems: 4
      maxItems: 4
      items:
        type: object
        required: [words]
        properties:
          label:
            type: string
          words:
            type: array
            minItems: 4
            maxItems: 4
            items:
              type: string
